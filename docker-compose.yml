version: '3.8'

services:
  database:
    image: mongo:6.0
    container_name: elitefit-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: elitefit-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/elitefit
      - CLIENT_URL=http://localhost:3000
      - JWT_SECRET=ProductionSuperSecretJWTKey123!
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: elitefit-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  mongodb_data:
